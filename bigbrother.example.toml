[github]
# GitHub API token used for PR search and follow-up API calls.
api_token = "$GITHUB_TOKEN"
# GitHub login used to find authored PRs and review requests.
author = "$GITHUB_USER"
# GitHub Search API query for authored PRs. `{author}` will be replaced by the value above.
query = "is:pr is:open archived:false author:{author}"
# Maximum number of authored PRs to pull into the tracked working set each poll.
max_prs = 25
# Optional GitHub API base URL override for GitHub Enterprise or testing.
# api_base_url = "https://api.github.com"

[daemon]
# Poll interval for refreshing GitHub state and scheduling new work.
poll_interval_secs = 60
# Maximum number of concurrent agent runs across all tracked PRs.
max_concurrent_runs = 2

[workspace]
# Default root used to locate sibling repository checkouts like ../tikv or ../tidb
root = ".."
# Optional explicit overrides when a repo cannot be found as ../<repo-name>.
# repo_map = { "tidbcloud/tidb-cse" = "../tidb-cse", "tikv/tikv" = "../tikv" }
# Git transport used when syncing PR branches and fetching base refs.
git_transport = "ssh"

[agent]
# Executable used to run the coding agent. BigBrother infers Codex vs Claude behavior from this
# command name. The default is `codex`.
command = "codex"
# Arguments passed to the agent command. Put backend-specific flags directly here.
# This example defaults Codex to full local access on a trusted development machine.
args = ["--dangerously-bypass-approvals-and-sandbox", "-c", "model_reasoning_effort=\"xhigh\"", "exec", "--model", "gpt-5.4", "-"]
# For Claude Code print mode instead, switch to:
# command = "claude"
# args = ["--dangerously-skip-permissions", "-p", "--output-format", "text"]
# Extra operator guidance appended to every generated prompt.
additional_instructions = """
- Prefer using `gh` when you need to inspect the latest PR review comments or CI state.
- Work only inside the current workspace checkout.
- Push fixes directly to the PR head branch when validation passes.
- If you are blocked, explain the blocker clearly in the final output.
"""

# Optional override for the persisted local state file.
# state_path = "./bigbrother-state.json"

# Private DM mode via an enterprise self-built app bot.
[notifications.feishu]
# Feishu app ID for the self-built bot application.
# app_id = "$FEISHU_APP_ID"
# Feishu app secret for the same bot application.
# app_secret = "$FEISHU_APP_SECRET"
# Target user or chat identifier that receives daemon notifications.
# receive_id = "$FEISHU_NOTIFY_EMAIL"
# Type of `receive_id`: one of `email`, `open_id`, `user_id`, `union_id`, or `chat_id`.
# receive_id_type = "email"
# Short instance label included in each DM so multiple daemons are easy to distinguish.
# label = "mbp"
# HTTP timeout for Feishu notification delivery.
# timeout_secs = 10
